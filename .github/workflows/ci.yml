name: CI

	on:
		push:
		braches:[master]
	jobs:
		build-and-push:	
		runs-on: ubuntu-latest 
			steps:
			- uses: actions/checkout@v4
			- uses: docker/setup-buildx-actions@v4

		- name: Login to Docker Hub
        		uses: docker/login-action@v4
        	     with:
          		username: ${{ vars.DOCKERHUB_USERNAME }}
         		password: ${{ secrets.DOCKERHUB_TOKEN }}
