name: CI

on:
  push:
    branches: [ "master" ]

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Debug secrets
        run: |
          echo "Checking DOCKERHUB_USERNAME..."
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "USERNAME NOT FOUND"; else echo "USERNAME OK"; fi

          echo "Checking DOCKERHUB_TOKEN..."
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "TOKEN NOT FOUND"; else echo "TOKEN OK"; fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
